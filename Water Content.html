<script>

function calculateObservations(){

    for(let i=1;i<=6;i++){

        const container =
        parseFloat(document.getElementById(`MassofContainer${i}`).value);

        const wetSoil =
        parseFloat(document.getElementById(`MassofContainerwithWetSoil${i}`).value);

        const drySoil =
        parseFloat(document.getElementById(`MassofContainerwithDrySoil${i}`).value);

        if(
            isNaN(container) ||
            isNaN(wetSoil) ||
            isNaN(drySoil)
        ){
            continue;
        }

        const massWater = wetSoil - drySoil;

        const massDrySoil = drySoil - container;

        const waterContent =
        (massWater / massDrySoil) * 100;

        document.getElementById(`MassofWater${i}`).innerHTML =
        massWater.toFixed(2);

        document.getElementById(`MassofDrySoil${i}`).innerHTML =
        massDrySoil.toFixed(2);

        document.getElementById(`WaterContent${i}`).innerHTML =
        waterContent.toFixed(2);
    }
}

function printTable(){
    window.print();
}

function clearAll(){

    for(let i=1;i<=6;i++){

        document.getElementById(`MassofContainer${i}`).value = "";
        document.getElementById(`MassofContainerwithWetSoil${i}`).value = "";
        document.getElementById(`MassofContainerwithDrySoil${i}`).value = "";

        document.getElementById(`MassofWater${i}`).innerHTML = "-";
        document.getElementById(`MassofDrySoil${i}`).innerHTML = "-";
        document.getElementById(`WaterContent${i}`).innerHTML = "-";
    }

    document.getElementById("studentName").value = "";
    document.getElementById("class").value = "";
    document.getElementById("rollNumber").value = "";
}

</script>
